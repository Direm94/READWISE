<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading - ReadWise</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh2q6syR/logo-2.png">
</head>
<body>
    <div class="container">
        <header class="reader-header">
            <div class="top-bar">
                <a href="dashboard.html" class="back-btn">← Back to Readings</a>
                <div class="user-info">
                    <span id="userGreeting"></span>
                    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress" id="progressBar"></div>
                </div>
                <span class="progress-text">Reading Progress</span>
            </div>
            <h1 id="readingTitle"></h1>
        </header>

        <main class="reader-layout">
            <aside class="tools-panel">
                <div class="tool-section">
                    <h3>🎯 Tools</h3>
                    <button class="tool-btn" onclick="toggleHighlight()" id="highlightBtn">
                        ✨ Highlight Key Ideas
                    </button>
                    <button class="tool-btn" onclick="showVocabulary()">
                        📚 Useful Vocabulary
                    </button>
                    <button class="tool-btn" onclick="toggleTranslation()">
                        🌐 Show Translation (hard words)
                    </button>
                    <button class="tool-btn" onclick="speakText()">
                        🔊 Listen to Text
                    </button>
                </div>
                
                <div class="tool-section">
                    <h3>💡 Help</h3>
                    <button class="tool-btn hint-btn" onclick="showHint()">
                        🤔 Give me a hint
                    </button>
                    <div id="hintBox" class="hint-box hidden"></div>
                </div>

                <div class="tool-section">
                    <h3>📝 My Progress</h3>
                    <div class="stats">
                        <div class="stat-item">
                            <span class="stat-number" id="wordsRead">0</span>
                            <span class="stat-label">words</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="clicksHelp">0</span>
                            <span class="stat-label">helps used</span>
                        </div>
                    </div>
                </div>
            </aside>

            <article class="reading-area">
                <div id="textContent" class="text-content"></div>
                
                <div id="comprehensionSection" class="comprehension-section hidden">
                    <div class="section-header">
                        <h2>🤔 Check Your Understanding</h2>
                        <p class="instructions">
                            Answer in <strong>your own words</strong>. There are no single "correct" answers — 
                            what matters is your <strong>thinking</strong> and <strong>interpretation</strong>!
                        </p>
                    </div>
                    
                    <div id="questionsContainer"></div>
                    
                    <button class="submit-btn" onclick="checkUnderstanding()">
                        ✅ Check My Answers
                    </button>
                    
                    <div id="feedbackArea" class="feedback-area hidden"></div>
                </div>

                <button id="finishReadingBtn" class="finish-btn" onclick="finishReading()">
                    🎯 I have finished reading and understanding
                </button>
            </article>
        </main>
    </div>

    <script>
        // Check user
        const userName = localStorage.getItem('readwiseUser');
        if (!userName) window.location.href = 'index.html';
        else document.getElementById('userGreeting').textContent = `👋 ${userName}`;

        // Theme
        const currentTheme = localStorage.getItem('readwiseTheme') || 'light';
        document.body.setAttribute('data-theme', currentTheme);
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('readwiseTheme', next);
        }

                text: `Last summer, my family and I decided to go camping in the mountains. We planned the trip for two weeks because we wanted everything to be perfect. On Friday morning, we packed our car with tents, sleeping bags, and lots of food. My dad drove for three hours while my mom showed us photos of the place on her phone. When we arrived, the view was amazing! Tall green trees everywhere, and a clear blue lake near our camping spot. We set up the tent together - it was more difficult than it looked in the video! In the evening, we made a campfire and cooked hot dogs. My sister told scary stories, but I wasn't afraid because the stars were so beautiful. The next day, we hiked up the mountain. It was tiring, but when we reached the top, we could see the entire valley. I felt proud and happy. We stayed for three days, and I took many photos. On the last night, it rained a little, but we stayed dry inside the tent. I will never forget this trip because it was my first time camping, and I learned that nature is more beautiful than any video game.`,

                        id: 1,

                        guidanceES: '¿Por qué alguien planearía tanto tiempo? ¿Qué importancia le da a la preparación?',

                difficultWords: {

                    },
                    {

                        text: 'The writer compares sleep with an investment. Why do you think they use this economic metaphor? What does it imply?',
                        textES: 'El autor compara el sueño con una inversión. ¿Por qué crees que usa esta metáfora económica? ¿Qué implica?',
                        type: 'open',
                        guidance: 'An investment requires something now to get benefits later. How does this work with sleep?',

        let currentReading = null;
        let hintIndex = 0;
        let highlightMode = false;
        let helpClicks = 0;

        function init() {
            const readingId = localStorage.getItem('currentReading');
            currentReading = readingDB[readingId];
            
            if (!currentReading) {
                alert('Reading not found');
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('readingTitle').textContent = currentReading.title;
            renderText();
            updateStats();
        }

        function renderText() {
            let text = currentReading.text;
            
            Object.keys(currentReading.difficultWords).forEach(word => {
                const regex = new RegExp(`\\b${word}\\b`, 'gi');
                text = text.replace(regex, `<span class="difficult-word" data-word="${word}" onclick="showWordHelp('${word}')">${word}</span>`);
            });

            document.getElementById('textContent').innerHTML = `<p>${text}</p>`;
        }

        function showWordHelp(word) {
            helpClicks++;
            updateStats();
            const translation = currentReading.difficultWords[word];
            const existing = document.querySelector('.word-popup');
            if (existing) existing.remove();

            const popup = document.createElement('div');
            popup.className = 'word-popup';
            popup.innerHTML = `
                <strong>${word}</strong><br>
                <span class="translation">${translation}</span><br>
                <small>💡 Tip: Try to guess the meaning from context before checking</small>
            `;
            
            const wordElement = document.querySelector(`[data-word="${word}"]`);
            wordElement.appendChild(popup);

            setTimeout(() => popup.remove(), 4000);
        }

        function toggleHighlight() {
            highlightMode = !highlightMode;
            const btn = document.getElementById('highlightBtn');
            const textElement = document.getElementById('textContent');
            
            if (highlightMode) {
                btn.classList.add('active');
                let text = currentReading.text;
                currentReading.keyPhrases.forEach(phrase => {
                    const escapedPhrase = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(escapedPhrase, 'gi');
                    text = text.replace(regex, `<mark class="key-phrase">${phrase}</mark>`);
                });
                textElement.innerHTML = `<p>${text}</p>`;
                Object.keys(currentReading.difficultWords).forEach(word => {
                    const regex = new RegExp(`\\b${word}\\b`, 'gi');
                    textElement.innerHTML = textElement.innerHTML.replace(regex, `<span class="difficult-word" data-word="${word}" onclick="showWordHelp('${word}')">${word}</span>`);
                });
            } else {
                btn.classList.remove('active');
                renderText();
            }
        }

        function showVocabulary() {
            helpClicks++;
            updateStats();
            const vocab = Object.entries(currentReading.difficultWords)
                .map(([word, trans]) => `• ${word} = ${trans}`)
                .join('\n');
            alert('📚 Useful Vocabulary:\n\n' + vocab + '\n\n💡 Try to guess from context first, then check.');
        }

        function toggleTranslation() {
            const words = document.querySelectorAll('.difficult-word');
            words.forEach(word => {
                word.classList.toggle('show-translation');
            });
        }

        function speakText() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentReading.text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            } else {
                alert('Sorry, your browser does not support text-to-speech.');
            }
        }

        function showHint() {
            helpClicks++;
            updateStats();
            const hints = currentReading.hints;
            if (hintIndex < hints.length) {
                document.getElementById('hintBox').textContent = hints[hintIndex];
                document.getElementById('hintBox').classList.remove('hidden');
                hintIndex++;
            } else {
                document.getElementById('hintBox').textContent = '💡 You have seen all hints! Now try to answer with your own words. Remember: there is no single correct answer.';
                document.getElementById('hintBox').classList.remove('hidden');
            }
        }

        function updateStats() {
            document.getElementById('clicksHelp').textContent = helpClicks;
            if (currentReading) {
                document.getElementById('wordsRead').textContent = currentReading.text.split(' ').length;
            }
        }

        function finishReading() {
            document.getElementById('comprehensionSection').classList.remove('hidden');
            document.getElementById('finishReadingBtn').classList.add('hidden');
            
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            currentReading.questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question-box';
                
                // Build vocab help HTML
                let vocabHTML = '';
                if (q.vocabHelp) {
                    vocabHTML = `
                        <div class="vocab-help">
                            <button class="vocab-toggle" onclick="toggleVocab(${q.id})">
                                📖 Need help with question words?
                            </button>
                            <div id="vocab-${q.id}" class="vocab-content hidden">
                                ${Object.entries(q.vocabHelp).map(([word, meaning]) => 
                                    `<span class="vocab-item"><strong>${word}</strong>: ${meaning}</span>`
                                ).join('')}
                            </div>
                        </div>
                    `;
                }

                div.innerHTML = `
                    <div class="question-header">
                        <span class="question-number">${index + 1}</span>
                        <div class="question-text-wrapper">
                            <p class="question-text">${q.text}</p>
                            <p class="question-text-es">🇪🇸 ${q.textES}</p>
                        </div>
                    </div>
                    ${vocabHTML}
                    <textarea 
                        id="answer-${q.id}" 
                        class="answer-input" 
                        placeholder="Write your answer here in your own words. There are no unique correct answers..."
                        rows="5"
                    ></textarea>
                    <button class="guidance-btn" onclick="showGuidance(${q.id})">
                        💡 Need guidance to think?
                    </button>
                    <div id="guidance-${q.id}" class="guidance-text hidden"></div>
                `;
                container.appendChild(div);
            });

            container.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleVocab(questionId) {
            const vocabDiv = document.getElementById(`vocab-${questionId}`);
            vocabDiv.classList.toggle('hidden');
        }

        function showGuidance(questionId) {
            helpClicks++;
            updateStats();
            const question = currentReading.questions.find(q => q.id === questionId);
            const guidanceElement = document.getElementById(`guidance-${questionId}`);
            guidanceElement.innerHTML = `
                <div class="guidance-en"><strong>💡 Guidance:</strong> ${question.guidance}</div>
                <div class="guidance-es">🇪🇸 ${question.guidanceES}</div>
            `;
            guidanceElement.classList.remove('hidden');
        }

        function checkUnderstanding() {
            const answers = currentReading.questions.map(q => {
                const answer = document.getElementById(`answer-${q.id}`).value.trim();
                return { question: q.text, answer: answer, id: q.id };
            });

            const emptyAnswers = answers.filter(a => a.answer.length < 15);
            if (emptyAnswers.length > 0) {
                alert('Please answer all questions with at least 2-3 sentences. Your opinion and reasoning matter!');
                return;
            }

            // Save completion
            const completed = JSON.parse(localStorage.getItem('readwiseCompleted') || '[]');
            const readingId = localStorage.getItem('currentReading');
            if (!completed.includes(readingId)) {
                completed.push(readingId);
                localStorage.setItem('readwiseCompleted', JSON.stringify(completed));
            }
            localStorage.setItem('readwiseHints', (parseInt(localStorage.getItem('readwiseHints') || 0) + helpClicks).toString());

            const feedbackArea = document.getElementById('feedbackArea');
            let feedbackHTML = `
                <div class="feedback-header">
                    <h3>🌟 Excellent reflective work, ${userName}!</h3>
                    <p>Remember: in reading comprehension there are no "correct" unique answers. 
                    What is valuable is that you <strong>thought</strong> and <strong>interpreted</strong> the text.</p>
                </div>
            `;
            
            feedbackHTML += '<div class="feedback-details">';
            answers.forEach((a, index) => {
                const length = a.answer.length;
                let encouragement = '';
                let icon = '';
                if (length < 80) {
                    encouragement = 'Good start. Try to expand your answer next time. Can you give a specific example from the text?';
                    icon = '🌱';
                } else if (length < 150) {
                    encouragement = 'Good reflection! You show that you read with attention. Did you notice any additional detail you could mention?';
                    icon = '🌿';
                } else {
                    encouragement = 'Very complete analysis! You show excellent comprehension and critical thinking. Keep it up!';
                    icon = '🌳';
                }
                
                feedbackHTML += `
                    <div class="feedback-item">
                        <div class="feedback-item-header">
                            <span class="feedback-icon">${icon}</span>
                            <span class="feedback-level">Question ${index + 1}</span>
                        </div>
                        <p class="feedback-length">Your answer has <strong>${length}</strong> characters.</p>
                        <p class="encouragement">${encouragement}</p>
                    </div>
                `;
            });
            feedbackHTML += '</div>';

            feedbackHTML += `
                <div class="next-steps">
                    <h4>🚀 What to do now to consolidate your learning?</h4>
                    <div class="steps-grid">
                        <div class="step-card">
                            <span class="step-icon">🔄</span>
                            <p><strong>Re-read</strong> the text and find details you did not notice before</p>
                        </div>
                        <div class="step-card">
                            <span class="step-icon">📝</span>
                            <p><strong>Summarize</strong> the text in 3 sentences with your own words</p>
                        </div>
                        <div class="step-card">
                            <span class="step-icon">🗣️</span>
                            <p><strong>Explain</strong> the text to someone else or record an audio</p>
                        </div>
                        <div class="step-card">
                            <span class="step-icon">🎯</span>
                            <p><strong>Connect</strong> the topic with your own life or experience</p>
                        </div>
                    </div>
                    <button class="new-reading-btn" onclick="window.location.href='dashboard.html'">
                        📚 Choose Another Reading
                    </button>
                </div>
            `;

            feedbackArea.innerHTML = feedbackHTML;
            feedbackArea.classList.remove('hidden');
            feedbackArea.scrollIntoView({ behavior: 'smooth' });
        }

        init();
    </script>
</body>
</html>

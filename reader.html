<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío — ReadWise Quest</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh2q6syR/logo-2.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="confetti-container" id="confetti"></div>
    
    <nav class="top-nav glass">
        <div class="nav-brand">
            <img src="https://i.postimg.cc/Rh2q6syR/logo-2.png" class="nav-logo">
            <span>ReadWise Quest</span>
        </div>
        <div class="nav-user">
            <div class="timer" id="readingTimer">⏱️ 00:00</div>
            <div class="xp-bar-mini">
                <div class="xp-fill" id="xpFill"></div>
                <span id="xpText">0 XP</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            <button class="icon-btn" onclick="window.location.href='dashboard.html'" title="Volver">←</button>
        </div>
    </nav>

    <div class="container reader-container">
        <div class="reading-progress-bar">
            <div class="reading-progress-fill" id="readingProgress"></div>
        </div>

        <div class="reader-layout">
            <aside class="tools-panel glass">
                <div class="player-mini">
                    <div class="mini-avatar" id="miniAvatar">🦁</div>
                    <div class="mini-info">
                        <span id="miniName">Jugador</span>
                        <span class="mini-level">Lvl <span id="miniLevel">1</span></span>
                    </div>
                </div>

                <div class="tool-section">
                    <h3>🎯 Herramientas</h3>
                    <button class="tool-btn" onclick="toggleHighlight()" id="highlightBtn">
                        <span class="tool-icon">✨</span>
                        <span>Resaltar ideas clave</span>
                    </button>
                    <button class="tool-btn" onclick="showVocabulary()">
                        <span class="tool-icon">📚</span>
                        <span>Vocabulario</span>
                    </button>
                    <button class="tool-btn" onclick="toggleTranslation()">
                        <span class="tool-icon">🌐</span>
                        <span>Traducción</span>
                    </button>
                    <button class="tool-btn" onclick="speakText()">
                        <span class="tool-icon">🔊</span>
                        <span>Escuchar texto</span>
                    </button>
                </div>
                
                <div class="tool-section">
                    <h3>💡 Ayudas</h3>
                    <button class="tool-btn hint-btn" onclick="showHint()">
                        <span class="tool-icon">🤔</span>
                        <span>Pista (<span id="hintsLeft">3</span>)</span>
                    </button>
                    <div id="hintBox" class="hint-box hidden"></div>
                </div>

                <div class="tool-section">
                    <h3>📊 Sesión</h3>
                    <div class="session-stats">
                        <div class="s-stat">
                            <span class="s-stat-num" id="wordsCount">0</span>
                            <span class="s-stat-label">palabras</span>
                        </div>
                        <div class="s-stat">
                            <span class="s-stat-num" id="helpsCount">0</span>
                            <span class="s-stat-label">ayudas</span>
                        </div>
                    </div>
                </div>
            </aside>

            <article class="reading-area glass">
                <div class="reading-header">
                    <h1 id="readingTitle"></h1>
                    <div class="reading-badges">
                        <span class="r-badge" id="diffBadge">⭐</span>
                        <span class="r-badge" id="xpBadge">+50 XP</span>
                    </div>
                </div>

                <div id="textContent" class="text-content"></div>
                
                <div class="scroll-indicator" id="scrollIndicator">
                    <span>👇 Sigue leyendo...</span>
                </div>

                <div id="comprehensionSection" class="comprehension-section hidden">
                    <div class="comprehension-header">
                        <h2>🎯 ¡Momento de demostrar tu comprensión!</h2>
                        <p class="comprehension-subtitle">
                            Responde en <strong>tus propias palabras</strong>. No hay respuestas únicas correctas.
                        </p>
                    </div>
                    
                    <div id="questionsContainer"></div>
                    
                    <button class="submit-btn" onclick="checkUnderstanding()">
                        <span>✨ Enviar respuestas</span>
                        <span class="btn-glow"></span>
                    </button>
                    
                    <div id="feedbackArea" class="feedback-area hidden"></div>
                </div>

                <button id="finishReadingBtn" class="finish-btn" onclick="finishReading()">
                    <span>🎯 He terminado de leer</span>
                    <span class="btn-particles"></span>
                </button>
            </article>
        </div>
    </div>

    <!-- Modal de celebración -->
    <div class="celebration-modal hidden" id="celebrationModal">
        <div class="celebration-content">
            <div class="celebration-emoji">🎉</div>
            <h2>¡Desafío completado!</h2>
            <div class="xp-earned">
                <span class="xp-big" id="xpEarned">+50</span>
                <span>XP ganados</span>
            </div>
            <div class="celebration-stats" id="celebrationStats"></div>
            <button class="celebration-btn" onclick="closeCelebration()">
                Continuar mi aventura →
            </button>
        </div>
    </div>

    <script>
        // ========== BASE DE DATOS COMPLETA ==========
        const readingDB = {
            'a1-1': {
                title: 'My Morning Routine',
                text: `Every morning, I wake up at 7 o'clock. First, I wash my face and brush my teeth. Then, I eat breakfast with my family. We usually have bread, eggs, and orange juice. After breakfast, I put on my school uniform and pack my backpack. I leave home at 8:15 and walk to school with my sister. School starts at 8:30. In the morning, we have four classes: math, science, English, and history. At 12:30, we have lunch in the cafeteria. I always sit with my friends. In the afternoon, we have art and music. School finishes at 3:00. When I get home, I do my homework first. Then, I play video games for one hour. At 7:00, we have dinner together. Before bed, I read a book for 20 minutes. I usually go to sleep at 9:30. This is my typical day!`,
                difficultWords: {
                    'brush': 'cepillar',
                    'uniform': 'uniforme',
                    'backpack': 'mochila',
                    'cafeteria': 'cafetería',
                    'typical': 'típico'
                },
                keyPhrases: ['wake up at 7', 'eat breakfast with my family', 'put on my school uniform', 'School starts at 8:30', 'do my homework first', 'read a book for 20 minutes'],
                questions: [
                    {
                        id: 1,
                        text: 'What do you think is the most important part of this person\'s routine? Why do you think so?',
                        textES: '¿Qué crees que es la parte más importante de la rutina de esta persona? ¿Por qué lo piensas?',
                        guidance: 'Think about which activity they never skip and why they describe it in detail.',
                        guidanceES: 'Piensa en qué actividad nunca omiten y por qué la describen con detalle.',
                        vocabHelp: {
                            'routine': 'rutina (lo que haces todos los días)',
                            'important': 'importante',
                            'think': 'pensar'
                        }
                    },
                    {
                        id: 2,
                        text: 'The person says "This is my typical day". What does this tell you about their life? Is it always exactly the same or can it change?',
                        textES: 'La persona dice "This is my typical day". ¿Qué te dice esto sobre su vida? ¿Es siempre exactamente igual o puede cambiar?',
                        guidance: 'The word "typical" is key. Does it mean every day is identical or that there is a general pattern?',
                        guidanceES: 'La palabra "typical" es clave. ¿Significa que todos los días son idénticos o que hay un patrón general?',
                        vocabHelp: {
                            'typical': 'típico/habitual',
                            'exactly': 'exactamente',
                            'change': 'cambiar'
                        }
                    }
                ],
                hints: [
                    '🔍 Look at which activities they repeat every day and which ones are with other people.',
                    '🔍 The text uses "usually" and "typical". What is the difference between "always" and "usually"?',
                    '🔍 Pay attention to the chronological order: what happens before school, during school, and after school?'
                ],
                xp: 50,
                difficulty: '⭐'
            },
            'a1-2': {
                title: 'At the Coffee Shop',
                text: `Every Saturday, I go to my favorite coffee shop. It is called "The Morning Sun". The shop is small but very cozy. There are five tables and a big window. I always sit near the window because I like to watch people walk by. The waiter, Tom, knows my name. He always smiles and says, "Good morning! The usual?" I always order the same thing: a cappuccino and a chocolate muffin. The cappuccino is hot and creamy. The muffin is soft and sweet. Sometimes, I bring my laptop and do my homework. Other times, I read a book or listen to music. My friend Maria sometimes meets me there. We talk about our week and laugh a lot. The coffee shop is my favorite place because it feels like a second home. I feel happy and relaxed there.`,
                difficultWords: {
                    'cozy': 'acogedor',
                    'waiter': 'mesero/camarero',
                    'cappuccino': 'capuchino',
                    'creamy': 'cremoso',
                    'relaxed': 'relajado'
                },
                keyPhrases: ['my favorite coffee shop', 'sit near the window', 'The usual', 'feels like a second home', 'happy and relaxed'],
                questions: [
                    {
                        id: 1,
                        text: 'Why do you think the writer calls the coffee shop "a second home"? What does a person need to feel this way in a place?',
                        textES: '¿Por qué crees que el autor llama a la cafetería "un segundo hogar"? ¿Qué necesita una persona para sentirse así en un lugar?',
                        guidance: 'Think about what makes a place special. Is it just the food or is there something more?',
                        guidanceES: 'Piensa en qué hace que un lugar sea especial. ¿Es solo la comida o hay algo más?',
                        vocabHelp: {
                            'writer': 'escritor/autor',
                            'second home': 'segundo hogar',
                            'feel': 'sentirse'
                        }
                    },
                    {
                        id: 2,
                        text: 'The waiter asks "The usual?". What does this tell us about the relationship between the writer and Tom?',
                        textES: 'El mesero le pregunta "The usual?". ¿Qué nos dice esto sobre la relación entre el autor y Tom?',
                        guidance: 'What does it mean when someone knows your usual order? Is it a relationship of trust?',
                        guidanceES: '¿Qué significa cuando alguien conoce tu orden habitual? ¿Es una relación de confianza?',
                        vocabHelp: {
                            'relationship': 'relación',
                            'usual': 'habitual/lo de siempre',
                            'trust': 'confianza'
                        }
                    }
                ],
                hints: [
                    '🔍 Pay attention to emotions: "happy", "relaxed", "cozy". What creates these feelings?',
                    '🔍 The writer mentions "watch people walk by". Why do they like this?',
                    '🔍 Compare "The Morning Sun" with other places. What makes it different?'
                ],
                xp: 50,
                difficulty: '⭐'
            },
            'a2-1': {
                title: 'A Trip to the Mountains',
                text: `Last summer, my family and I decided to go camping in the mountains. We planned the trip for two weeks because we wanted everything to be perfect. On Friday morning, we packed our car with tents, sleeping bags, and lots of food. My dad drove for three hours while my mom showed us photos of the place on her phone. When we arrived, the view was amazing! Tall green trees everywhere, and a clear blue lake near our camping spot. We set up the tent together - it was more difficult than it looked in the video! In the evening, we made a campfire and cooked hot dogs. My sister told scary stories, but I wasn't afraid because the stars were so beautiful. The next day, we hiked up the mountain. It was tiring, but when we reached the top, we could see the entire valley. I felt proud and happy. We stayed for three days, and I took many photos. On the last night, it rained a little, but we stayed dry inside the tent. I will never forget this trip because it was my first time camping, and I learned that nature is more beautiful than any video game.`,
                difficultWords: {
                    'camping': 'acampar',
                    'sleeping bags': 'sacos de dormir',
                    'set up': 'montar/armar',
                    'hiked': 'caminar/senderismo',
                    'valley': 'valle',
                    'entire': 'entero/completo'
                },
                keyPhrases: ['planned the trip for two weeks', 'the view was amazing', 'more difficult than it looked', 'I felt proud and happy', 'nature is more beautiful than any video game'],
                questions: [
                    {
                        id: 1,
                        text: 'The writer says they planned the trip for two weeks. What does this tell us about their personality?',
                        textES: 'El autor dice que planeó el viaje por dos semanas. ¿Qué nos dice esto sobre su personalidad?',
                        guidance: 'Why would someone plan for so long? What importance do they give to preparation?',
                        guidanceES: '¿Por qué alguien planearía tanto tiempo? ¿Qué importancia le da a la preparación?',
                        vocabHelp: {
                            'planned': 'planeó',
                            'personality': 'personalidad',
                            'preparation': 'preparación'
                        }
                    },
                    {
                        id: 2,
                        text: 'The tent was "more difficult than it looked in the video". What lesson did the writer learn?',
                        textES: 'La tienda fue "más difícil de lo que parecía en el video". ¿Qué lección aprendió el autor?',
                        guidance: 'Think about the difference between watching something and doing it.',
                        guidanceES: 'Piensa en la diferencia entre ver algo y hacerlo.',
                        vocabHelp: {
                            'expectations': 'expectativas',
                            'reality': 'realidad',
                            'lesson': 'lección'
                        }
                    }
                ],
                hints: [
                    '🔍 The writer uses comparisons. Find "more difficult than" and "more beautiful than".',
                    '🔍 Pay attention to feelings: "proud", "happy", "never forget".',
                    '🔍 The text contrasts preparation vs. reality, and technology vs. nature.'
                ],
                xp: 75,
                difficulty: '⭐⭐'
            },
            'b1-1': {
                title: 'The Importance of Sleep',
                text: `In today's busy world, many people forget the importance of a good night's sleep. We live in a society that values productivity and constant activity. However, scientific studies show that sleep is not a luxury - it is a necessity for our physical and mental health. When we sleep, our brain processes information from the day. It organizes memories and removes toxins. Without enough sleep, our concentration decreases significantly. We make more mistakes, and our creativity suffers. Adults need between seven and nine hours of sleep per night, but teenagers require even more. Unfortunately, many students stay up late studying or using their phones. They believe that sacrificing sleep will help them achieve more. In reality, the opposite happens. A tired brain cannot learn effectively. To improve sleep quality, experts recommend several habits. First, establish a regular schedule. Go to bed and wake up at the same time every day, even on weekends. Second, avoid screens for at least one hour before bedtime. The blue light from phones and computers tricks our brain into thinking it is still daytime. Third, create a comfortable environment. Keep your bedroom cool, dark, and quiet. Finally, avoid caffeine in the afternoon and evening. Many people do not realize that coffee consumed at 4 PM can still affect sleep at 11 PM. Good sleep habits are an investment in your health and success. When you sleep well, you think better, feel better, and perform better in everything you do.`,
                difficultWords: {
                    'productivity': 'productividad',
                    'toxins': 'toxinas',
                    'concentration': 'concentración',
                    'significantly': 'significantemente',
                    'sacrificing': 'sacrificar',
                    'establish': 'establecer',
                    'tricks': 'engañar',
                    'caffeine': 'cafeína',
                    'investment': 'inversión'
                },
                keyPhrases: ['sleep is not a luxury', 'processes information from the day', 'sacrificing sleep will help them achieve more', 'the opposite happens', 'an investment in your health'],
                questions: [
                    {
                        id: 1,
                        text: 'The text says we live in a society that values productivity. How does this pressure affect our sleep?',
                        textES: 'El texto dice que vivimos en una sociedad que valora la productividad. ¿Cómo afecta esta presión nuestro sueño?',
                        guidance: 'Think about social expectations. Do we feel pressure to always be busy?',
                        guidanceES: 'Piensa en las expectativas sociales. ¿Sentimos presión por estar siempre ocupados?',
                        vocabHelp: {
                            'society': 'sociedad',
                            'pressure': 'presión',
                            'productivity': 'productividad'
                        }
                    },
                    {
                        id: 2,
                        text: 'The writer compares sleep with an investment. Why do they use this metaphor?',
                        textES: 'El autor compara el sueño con una inversión. ¿Por qué usa esta metáfora?',
                        guidance: 'An investment requires something now to get benefits later.',
                        guidanceES: 'Una inversión requiere algo ahora para obtener beneficios después.',
                        vocabHelp: {
                            'investment': 'inversión',
                            'metaphor': 'metáfora',
                            'benefits': 'beneficios'
                        }
                    }
                ],
                hints: [
                    '🔍 The text contrasts social perception vs. scientific reality.',
                    '🔍 Look for the words "however" and "in reality".',
                    '🔍 The text has a structure: problem → consequences → solutions.'
                ],
                xp: 100,
                difficulty: '⭐⭐⭐'
            }
        };

        // ========== VARIABLES GLOBALES ==========
        let currentReading = null;
        let hintIndex = 0;
        let highlightMode = false;
        let helpClicks = 0;
        let startTime = Date.now();
        let timerInterval;
        let userData = JSON.parse(localStorage.getItem('readwiseUser') || '{}');
        let originalText = '';

        // ========== INICIALIZACIÓN ==========
        function init() {
            if (!userData.name) {
                window.location.href = 'index.html';
                return;
            }

            const readingId = localStorage.getItem('currentReading');
            currentReading = readingDB[readingId];
            
            if (!currentReading) {
                window.location.href = 'dashboard.html';
                return;
            }

            originalText = currentReading.text;

            document.getElementById('readingTitle').textContent = currentReading.title;
            document.getElementById('diffBadge').textContent = currentReading.difficulty;
            document.getElementById('xpBadge').textContent = `+${currentReading.xp} XP`;
            document.getElementById('miniAvatar').textContent = userData.avatar || '🦁';
            document.getElementById('miniName').textContent = userData.name;
            document.getElementById('miniLevel').textContent = userData.level || 1;
            
            const currentLevelXP = (userData.xp || 0) % 100;
            const xpPercent = (currentLevelXP / 100) * 100;
            document.getElementById('xpFill').style.width = xpPercent + '%';
            document.getElementById('xpText').textContent = `${currentLevelXP} / 100 XP`;

            renderText();
            startTimer();
            updateStats();
            
            window.addEventListener('scroll', () => {
                const scrollPercent = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
                document.getElementById('readingProgress').style.width = Math.min(scrollPercent, 100) + '%';
                
                if (scrollPercent > 80) {
                    document.getElementById('scrollIndicator').classList.add('hidden');
                }
            });
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const secs = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('readingTimer').textContent = `⏱️ ${mins}:${secs}`;
            }, 1000);
        }

        function renderText() {
            let text = originalText;
            
            Object.keys(currentReading.difficultWords).forEach(word => {
                const regex = new RegExp(`\\b${word}\\b`, 'gi');
                text = text.replace(regex, `<span class="difficult-word" data-word="${word}" onclick="showWordHelp('${word}')">${word}</span>`);
            });

            if (highlightMode) {
                currentReading.keyPhrases.forEach(phrase => {
                    const escapedPhrase = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(escapedPhrase, 'gi');
                    text = text.replace(regex, `<mark class="key-phrase">${phrase}</mark>`);
                });
            }

            document.getElementById('textContent').innerHTML = `<p>${text}</p>`;
            document.getElementById('wordsCount').textContent = originalText.split(' ').length;
        }

        function showWordHelp(word) {
            helpClicks++;
            updateStats();
            const translation = currentReading.difficultWords[word];
            
            const existing = document.querySelector('.word-popup');
            if (existing) existing.remove();

            const popup = document.createElement('div');
            popup.className = 'word-popup';
            popup.innerHTML = `
                <strong>${word}</strong><br>
                <span class="translation">${translation}</span><br>
                <small>💡 Tip: Try to guess from context first!</small>
            `;
            
            const wordElement = document.querySelector(`[data-word="${word}"]`);
            if (wordElement) {
                wordElement.style.position = 'relative';
                wordElement.appendChild(popup);
                setTimeout(() => popup.remove(), 4000);
            }
        }

        function toggleHighlight() {
            highlightMode = !highlightMode;
            const btn = document.getElementById('highlightBtn');
            
            if (highlightMode) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            renderText();
        }

        function showVocabulary() {
            helpClicks++;
            updateStats();
            const vocab = Object.entries(currentReading.difficultWords)
                .map(([word, trans]) => `• ${word} = ${trans}`)
                .join('\n');
            alert('📚 Useful Vocabulary:\n\n' + vocab + '\n\n💡 Try to guess from context first!');
        }

        function toggleTranslation() {
            const words = document.querySelectorAll('.difficult-word');
            words.forEach(word => {
                const translation = currentReading.difficultWords[word.textContent];
                if (word.classList.contains('show-translation')) {
                    word.classList.remove('show-translation');
                    word.setAttribute('title', '');
                } else {
                    word.classList.add('show-translation');
                    word.setAttribute('title', translation);
                }
            });
        }

        function speakText() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(originalText);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.pitch = 1;
                speechSynthesis.speak(utterance);
            } else {
                alert('Sorry, your browser does not support text-to-speech.');
            }
        }

        function showHint() {
            helpClicks++;
            updateStats();
            const hints = currentReading.hints;
            if (hintIndex < hints.length) {
                document.getElementById('hintBox').textContent = hints[hintIndex];
                document.getElementById('hintBox').classList.remove('hidden');
                document.getElementById('hintsLeft').textContent = Math.max(0, hints.length - hintIndex - 1);
                hintIndex++;
            } else {
                document.getElementById('hintBox').textContent = '💡 No more hints! Trust your reading skills.';
                document.getElementById('hintBox').classList.remove('hidden');
                document.getElementById('hintsLeft').textContent = '0';
            }
        }

        function updateStats() {
            document.getElementById('helpsCount').textContent = helpClicks;
        }

        function finishReading() {
            clearInterval(timerInterval);
            document.getElementById('comprehensionSection').classList.remove('hidden');
            document.getElementById('finishReadingBtn').classList.add('hidden');
            document.getElementById('scrollIndicator').classList.add('hidden');
            
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            currentReading.questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question-box';
                div.style.animationDelay = `${index * 0.1}s`;
                
                let vocabHTML = '';
                if (q.vocabHelp) {
                    vocabHTML = `
                        <div class="vocab-help">
                            <button class="vocab-toggle" onclick="toggleVocab(${q.id})">
                                📖 Need help with words?
                            </button>
                            <div id="vocab-${q.id}" class="vocab-content hidden">
                                ${Object.entries(q.vocabHelp).map(([word, meaning]) => 
                                    `<span class="vocab-item"><strong>${word}</strong>: ${meaning}</span>`
                                ).join('')}
                            </div>
                        </div>
                    `;
                }

                div.innerHTML = `
                    <div class="question-header">
                        <span class="question-number">${index + 1}</span>
                        <div class="question-text-wrapper">
                            <p class="question-text">${q.text}</p>
                            <p class="question-text-es">🇪🇸 ${q.textES}</p>
                        </div>
                    </div>
                    ${vocabHTML}
                    <textarea 
                        id="answer-${q.id}" 
                        class="answer-input" 
                        placeholder="Write your answer here in your own words..."
                        rows="5"
                    ></textarea>
                    <button class="guidance-btn" onclick="showGuidance(${q.id})">
                        💡 Need guidance?
                    </button>
                    <div id="guidance-${q.id}" class="guidance-text hidden"></div>
                `;
                container.appendChild(div);
            });

            container.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleVocab(questionId) {
            const vocabDiv = document.getElementById(`vocab-${questionId}`);
            if (vocabDiv) vocabDiv.classList.toggle('hidden');
        }

        function showGuidance(questionId) {
            helpClicks++;
            updateStats();
            const question = currentReading.questions.find(q => q.id === questionId);
            const guidanceElement = document.getElementById(`guidance-${questionId}`);
            if (guidanceElement && question) {
                guidanceElement.innerHTML = `
                    <div class="guidance-en"><strong>💡 Guidance:</strong> ${question.guidance}</div>
                    <div class="guidance-es">🇪🇸 ${question.guidanceES}</div>
                `;
                guidanceElement.classList.remove('hidden');
            }
        }

        function checkUnderstanding() {
            const answers = currentReading.questions.map(q => {
                const answer = document.getElementById(`answer-${q.id}`).value.trim();
                return { question: q.text, answer: answer, id: q.id };
            });

            const emptyAnswers = answers.filter(a => a.answer.length < 15);
            if (emptyAnswers.length > 0) {
                const submitBtn = document.querySelector('.submit-btn');
                submitBtn.classList.add('shake');
                setTimeout(() => submitBtn.classList.remove('shake'), 500);
                alert('Please answer all questions with at least 2-3 sentences. Your thinking matters!');
                return;
            }

            const readingId = localStorage.getItem('currentReading');
            const completed = userData.completed || [];
            const isFirstTime = !completed.includes(readingId);
            
            // Calcular XP
            const baseXP = currentReading.xp;
            const hintPenalty = hintIndex * 5;
            const elapsedMinutes = (Date.now() - startTime) / 60000;
            let timeBonus = Math.max(0, Math.floor(15 - elapsedMinutes));
            timeBonus = Math.min(timeBonus, 20);
            const totalXP = Math.max(baseXP - hintPenalty + timeBonus, 10);
            
            if (isFirstTime) {
                completed.push(readingId);
                userData.completed = completed;
                userData.xp = (userData.xp || 0) + totalXP;
                userData.totalHints = (userData.totalHints || 0) + helpClicks;
                
                // Subir de nivel
                const newLevel = Math.floor((userData.xp || 0) / 100) + 1;
                if (newLevel > (userData.level || 1) && newLevel <= 12) {
                    userData.level = newLevel;
                }
                
                localStorage.setItem('readwiseUser', JSON.stringify(userData));
            }

            // Mostrar feedback constructivo
            showFeedback(answers, totalXP, isFirstTime);
        }

        function showFeedback(answers, earnedXP, isFirstTime) {
            const feedbackArea = document.getElementById('feedbackArea');
            const timeElapsed = document.getElementById('readingTimer').textContent.replace('⏱️ ', '');
            
            const feedbackHTML = `
                <div class="feedback-header">
                    <h3>✨ ¡Excelente trabajo, ${userData.name}! ✨</h3>
                    <p>Tus respuestas demuestran que has comprendido la esencia del texto.</p>
                    <p>En la vida real, la comprensión lectora no se mide con respuestas correctas o incorrectas, sino con tu capacidad de reflexionar.</p>
                </div>
                <div class="feedback-details">
                    ${answers.map((a, i) => `
                        <div class="feedback-item">
                            <div class="feedback-item-header">
                                <span class="feedback-icon">💬</span>
                                <span class="feedback-level">Tu respuesta ${i + 1}</span>
                            </div>
                            <div class="feedback-length">${a.answer.length} caracteres - ¡Buen desarrollo de ideas!</div>
                            <div class="encouragement">💪 Has demostrado pensamiento crítico. Sigue así.</div>
                        </div>
                    `).join('')}
                </div>
                <div class="next-steps">
                    <h4>🎯 ¿Qué sigue?</h4>
                    <div class="steps-grid">
                        <div class="step-card">
                            <span class="step-icon">🏆</span>
                            <p>Has ganado <strong>${earnedXP} XP</strong></p>
                            <small>Tiempo: ${timeElapsed}</small>
                        </div>
                        <div class="step-card">
                            <span class="step-icon">📊</span>
                            <p>Recuerda que puedes repasar el texto cuando quieras</p>
                        </div>
                        <div class="step-card">
                            <span class="step-icon">🌟</span>
                            <p>Cada lectura te acerca más a la fluidez en inglés</p>
                        </div>
                    </div>
                    <button class="new-reading-btn" onclick="closeCelebration()">
                        Continuar mi aventura →
                    </button>
                </div>
            `;
            
            feedbackArea.innerHTML = feedbackHTML;
            feedbackArea.classList.remove('hidden');
            
            if (isFirstTime) {
                showCelebration(earnedXP);
            } else {
                // Si ya estaba completada, solo mostrar feedback
                feedbackArea.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function showCelebration(xp) {
            const modal = document.getElementById('celebrationModal');
            document.getElementById('xpEarned').textContent = `+${xp}`;
            
            const timeElapsed = document.getElementById('readingTimer').textContent.replace('⏱️ ', '');
            const statsHTML = `
                <div class="c-stat">
                    <span class="c-stat-icon">⏱️</span>
                    <span class="c-stat-val">${timeElapsed}</span>
                    <span class="c-stat-label">Tiempo</span>
                </div>
                <div class="c-stat">
                    <span class="c-stat-icon">🎯</span>
                    <span class="c-stat-val">${currentReading.questions.length}</span>
                    <span class="c-stat-label">Preguntas</span>
                </div>
                <div class="c-stat">
                    <span class="c-stat-icon">💡</span>
                    <span class="c-stat-val">${helpClicks}</span>
                    <span class="c-stat-label">Ayudas</span>
                </div>
            `;
            document.getElementById('celebrationStats').innerHTML = statsHTML;
            
            createConfetti();
            modal.classList.remove('hidden');
        }

        function createConfetti() {
            const container = document.getElementById('confetti');
            container.innerHTML = '';
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];
            
            for (let i = 0; i < 80; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti-piece';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDelay = Math.random() * 2 + 's';
                conf.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(conf);
            }
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 4000);
        }

        function closeCelebration() {
            window.location.href = 'hub.html';
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('readwiseTheme', next);
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }
        
        createParticles();
        const savedTheme = localStorage.getItem('readwiseTheme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        
        // Exponer funciones globales
        window.toggleHighlight = toggleHighlight;
        window.showVocabulary = showVocabulary;
        window.toggleTranslation = toggleTranslation;
        window.speakText = speakText;
        window.showHint = showHint;
        window.finishReading = finishReading;
        window.checkUnderstanding = checkUnderstanding;
        window.toggleVocab = toggleVocab;
        window.showGuidance = showGuidance;
        window.closeCelebration = closeCelebration;
        window.toggleTheme = toggleTheme;
        window.showWordHelp = showWordHelp;
        
        init();
    </script>
</body>
</html>

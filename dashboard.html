<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readings - ReadWise</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh2q6syR/logo-2.png">
</head>
<body>
    <div class="container">
        <header class="dash-header">
            <div class="top-bar">
                <a href="level-select.html" class="back-btn">← Change Level</a>
                <div class="user-info">
                    <span id="userGreeting"></span>
                    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
                </div>
            </div>
            <div class="dash-title">
                <h1>📖 Choose a Reading</h1>
                <p class="subtitle">Pick a text and start your interactive learning journey</p>
            </div>
        </header>

        <main id="readingList" class="reading-grid">
            <!-- Filled by JS -->
        </main>
    </div>

    <script>
        // Check user
        const userName = localStorage.getItem('readwiseUser');
        if (!userName) window.location.href = 'index.html';
        else document.getElementById('userGreeting').textContent = `👋 ${userName}`;

        // Theme
        const currentTheme = localStorage.getItem('readwiseTheme') || 'light';
        document.body.setAttribute('data-theme', currentTheme);
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('readwiseTheme', next);
        }

        const readings = {
            'A1': [
                {
                    id: 'a1-1',
                    title: 'My Morning Routine',
                    description: 'A simple description of daily routines with basic vocabulary',
                    words: 120,
                    time: '5 min',
                    tags: ['Routines', 'Present Simple', 'Family']
                },
                {
                    id: 'a1-2',
                    title: 'At the Coffee Shop',
                    description: 'Ordering food and drinks, everyday dialogues',
                    words: 150,
                    time: '6 min',
                    tags: ['Food', 'Dialogues', 'Services']
                },
                {
                    id: 'a1-3',
                    title: 'My Favorite Animal',
                    description: 'Describing animals with simple adjectives',
                    words: 100,
                    time: '4 min',
                    tags: ['Animals', 'Description', 'Adjectives']
                }
            ],
            'A2': [
                {
                    id: 'a2-1',
                    title: 'A Trip to the Mountains',
                    description: 'Travel experiences, place descriptions and emotions',
                    words: 200,
                    time: '8 min',
                    tags: ['Travel', 'Past Simple', 'Nature']
                },
                {
                    id: 'a2-2',
                    title: 'My Best Friend',
                    description: 'Describing people, relationships and activities together',
                    words: 180,
                    time: '7 min',
                    tags: ['Descriptions', 'Adjectives', 'Friendship']
                },
                {
                    id: 'a2-3',
                    title: 'A Day at the Beach',
                    description: 'Summer activities, weather and sensations',
                    words: 190,
                    time: '7 min',
                    tags: ['Summer', 'Activities', 'Senses']
                }
            ],
            'B1': [
                {
                    id: 'b1-1',
                    title: 'The Importance of Sleep',
                    description: 'Article about healthy habits and practical advice',
                    words: 350,
                    time: '12 min',
                    tags: ['Health', 'Connectors', 'Advice']
                },
                {
                    id: 'b1-2',
                    title: 'Working from Home',
                    description: 'Opinions about remote work, advantages and disadvantages',
                    words: 400,
                    time: '14 min',
                    tags: ['Work', 'Opinion', 'Comparison']
                },
                {
                    id: 'b1-3',
                    title: 'Learning a New Language',
                    description: 'Strategies and personal experiences in language learning',
                    words: 380,
                    time: '13 min',
                    tags: ['Languages', 'Advice', 'Experience']
                }
            ],
            'B2': [
                {
                    id: 'b2-1',
                    title: 'The Future of Education',
                    description: 'Analysis of educational trends and technology in classrooms',
                    words: 600,
                    time: '20 min',
                    tags: ['Education', 'Technology', 'Future']
                },
                {
                    id: 'b2-2',
                    title: 'Climate Change: A Personal View',
                    description: 'Argumentative essay about individual responsibility',
                    words: 550,
                    time: '18 min',
                    tags: ['Environment', 'Persuasion', 'Opinion']
                },
                {
                    id: 'b2-3',
                    title: 'The Art of Failure',
                    description: 'Reflection on failure as part of success',
                    words: 580,
                    time: '19 min',
                    tags: ['Success', 'Reflection', 'Motivation']
                }
            ]
        };

        const level = localStorage.getItem('userLevel') || 'A1';
        const completed = JSON.parse(localStorage.getItem('readwiseCompleted') || '[]');

        const list = document.getElementById('readingList');
        readings[level].forEach(reading => {
            const isDone = completed.includes(reading.id);
            const card = document.createElement('div');
            card.className = `reading-card ${isDone ? 'completed' : ''}`;
            card.innerHTML = `
                <div class="card-badge">${isDone ? '✅ Done' : level}</div>
                <div class="card-header">
                    <h3>${reading.title}</h3>
                    <span class="word-count">📝 ${reading.words} words · ⏱️ ${reading.time}</span>
                </div>
                <p class="card-description">${reading.description}</p>
                <div class="tags">
                    ${reading.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                </div>
                <button class="start-btn" onclick="startReading('${reading.id}')">
                    ${isDone ? '🔄 Read Again' : '📖 Start Reading'}
                </button>
            `;
            list.appendChild(card);
        });

        function startReading(id) {
            localStorage.setItem('currentReading', id);
            window.location.href = 'reader.html';
        }
    </script>
</body>
</html>

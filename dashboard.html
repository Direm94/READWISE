<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafíos — ReadWise Quest</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh2q6syR/logo-2.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <nav class="top-nav glass">
        <div class="nav-brand">
            <img src="https://i.postimg.cc/Rh2q6syR/logo-2.png" class="nav-logo">
            <span>ReadWise Quest</span>
        </div>
        <div class="nav-user">
            <div class="xp-bar-mini">
                <div class="xp-fill" id="xpFill"></div>
                <span id="xpText">0 XP</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            <button class="icon-btn" onclick="window.location.href='hub.html'" title="Volver al Hub">🏠</button>
        </div>
    </nav>

    <div class="container">
        <div class="level-header glass">
            <button class="back-arrow" onclick="window.location.href='hub.html'">←</button>
            <div class="level-info">
                <h1 id="levelTitle">Valle A1</h1>
                <p id="levelSubtitle">Desafíos para principiantes</p>
            </div>
            <div class="level-progress-circle" id="levelProgress">
                <span>0/3</span>
            </div>
        </div>

        <div class="challenges-grid" id="challengesGrid"></div>
    </div>

    <script>
        createParticles();
        
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }

        let userData = JSON.parse(localStorage.getItem('readwiseUser') || '{}');
        if (!userData.name) window.location.href = 'index.html';
        
        const level = localStorage.getItem('userLevel') || 'A1';
        
        const levelInfo = {
            'A1': { name: 'Valle A1', subtitle: 'Desafíos para principiantes', icon: '🏔️', color: '#10b981' },
            'A2': { name: 'Bosque A2', subtitle: 'Desafíos elementales', icon: '🌲', color: '#3b82f6' },
            'B1': { name: 'Fortaleza B1', subtitle: 'Desafíos intermedios', icon: '🏰', color: '#8b5cf6' },
            'B2': { name: 'Cima B2', subtitle: 'Desafíos avanzados', icon: '⭐', color: '#f59e0b' }
        };

        const info = levelInfo[level];
        document.getElementById('levelTitle').innerHTML = `${info.icon} ${info.name}`;
        document.getElementById('levelSubtitle').textContent = info.subtitle;
        document.querySelector('.level-header').style.borderLeft = `5px solid ${info.color}`;

        // XP bar
        const currentLevelXP = (userData.xp || 0) % 100;
        const xpPercent = (currentLevelXP / 100) * 100;
        document.getElementById('xpFill').style.width = xpPercent + '%';
        document.getElementById('xpText').textContent = `${currentLevelXP} / 100 XP`;

        // Base de datos de lecturas
        const readings = {
            'A1': [
                { id: 'a1-1', title: 'My Morning Routine', desc: 'Una descripción simple de rutinas diarias', words: 120, time: '5 min', xp: 50, difficulty: '⭐', tags: ['Routines', 'Present Simple'] },
                { id: 'a1-2', title: 'At the Coffee Shop', desc: 'Pedir comida y bebidas, diálogos cotidianos', words: 150, time: '6 min', xp: 50, difficulty: '⭐', tags: ['Food', 'Dialogues'] },
                { id: 'a1-3', title: 'My Favorite Animal', desc: 'Describiendo animales con adjetivos simples', words: 100, time: '4 min', xp: 50, difficulty: '⭐', tags: ['Animals', 'Description'] }
            ],
            'A2': [
                { id: 'a2-1', title: 'A Trip to the Mountains', desc: 'Experiencias de viaje y emociones', words: 200, time: '8 min', xp: 75, difficulty: '⭐⭐', tags: ['Travel', 'Past Simple'] },
                { id: 'a2-2', title: 'My Best Friend', desc: 'Describiendo personas y relaciones', words: 180, time: '7 min', xp: 75, difficulty: '⭐⭐', tags: ['Descriptions', 'Friendship'] },
                { id: 'a2-3', title: 'A Day at the Beach', desc: 'Actividades de verano y sensaciones', words: 190, time: '7 min', xp: 75, difficulty: '⭐⭐', tags: ['Summer', 'Senses'] }
            ],
            'B1': [
                { id: 'b1-1', title: 'The Importance of Sleep', desc: 'Artículo sobre hábitos saludables', words: 350, time: '12 min', xp: 100, difficulty: '⭐⭐⭐', tags: ['Health', 'Advice'] },
                { id: 'b1-2', title: 'Working from Home', desc: 'Opiniones sobre el trabajo remoto', words: 400, time: '14 min', xp: 100, difficulty: '⭐⭐⭐', tags: ['Work', 'Opinion'] },
                { id: 'b1-3', title: 'Learning a New Language', desc: 'Estrategias y experiencias', words: 380, time: '13 min', xp: 100, difficulty: '⭐⭐⭐', tags: ['Languages', 'Experience'] }
            ],
            'B2': [
                { id: 'b2-1', title: 'The Future of Education', desc: 'Análisis de tendencias educativas', words: 600, time: '20 min', xp: 150, difficulty: '⭐⭐⭐⭐', tags: ['Education', 'Future'] },
                { id: 'b2-2', title: 'Climate Change: A Personal View', desc: 'Ensayo argumentativo', words: 550, time: '18 min', xp: 150, difficulty: '⭐⭐⭐⭐', tags: ['Environment', 'Persuasion'] },
                { id: 'b2-3', title: 'The Art of Failure', desc: 'Reflexión sobre el fracaso y el éxito', words: 580, time: '19 min', xp: 150, difficulty: '⭐⭐⭐⭐', tags: ['Success', 'Reflection'] }
            ]
        };

        const completed = userData.completed || [];
        const levelReadings = readings[level] || [];
        const completedInLevel = completed.filter(id => id.startsWith(level.toLowerCase())).length;

        document.getElementById('levelProgress').innerHTML = `<span>${completedInLevel}/${levelReadings.length}</span>`;
        if (completedInLevel === levelReadings.length) {
            document.getElementById('levelProgress').classList.add('completed');
        }

        const grid = document.getElementById('challengesGrid');
        
        function startChallenge(readingId) {
            localStorage.setItem('currentReading', readingId);
            window.location.href = 'reader.html';
        }

        levelReadings.forEach((reading, index) => {
            const isDone = completed.includes(reading.id);
            const isLocked = index > 0 && !completed.includes(levelReadings[index - 1].id);
            
            const card = document.createElement('div');
            card.className = `challenge-card glass ${isDone ? 'completed' : ''} ${isLocked ? 'locked' : ''}`;
            
            card.innerHTML = `
                <div class="challenge-header">
                    <div class="challenge-number">#${index + 1}</div>
                    <div class="challenge-xp">+${reading.xp} XP</div>
                </div>
                <div class="challenge-icon">${isDone ? '🏆' : info.icon}</div>
                <h3 class="challenge-title">${reading.title}</h3>
                <p class="challenge-desc">${reading.desc}</p>
                <div class="challenge-meta">
                    <span>📝 ${reading.words} words</span>
                    <span>⏱️ ${reading.time}</span>
                    <span class="difficulty">${reading.difficulty}</span>
                </div>
                <div class="challenge-tags">
                    ${reading.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                <button class="challenge-btn ${isDone ? 'done' : isLocked ? 'locked' : ''}" 
                    onclick="${isLocked ? '' : `startChallenge('${reading.id}')`}">
                    ${isDone ? '✅ Completado' : isLocked ? '🔒 Bloqueado' : '⚔️ Iniciar Desafío'}
                </button>
                ${isLocked ? '<div class="lock-overlay"><span>Completa el desafío anterior</span></div>' : ''}
            `;
            
            grid.appendChild(card);
        });

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('readwiseTheme', next);
        }

        const savedTheme = localStorage.getItem('readwiseTheme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);

        window.startChallenge = startChallenge;
        window.toggleTheme = toggleTheme;
    </script>
</body>
</html>

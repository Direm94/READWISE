<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadWise - Comprensión Lectora Interactiva</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh2q6syR/logo-2.png">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <div class="logo-container">
                <img src="https://i.postimg.cc/Rh2q6syR/logo-2.png" alt="ReadWise Logo" class="app-logo">
                <div class="logo-text">
                    <h1>ReadWise</h1>
                    <p>Comprensión Lectora Interactiva</p>
                </div>
            </div>
        </header>

        <main class="level-selector">
            <h2>🎯 Selecciona tu nivel de inglés</h2>
            <p class="subtitle">Elige el nivel que mejor se adapte a ti y comienza a leer</p>
            
            <div class="levels">
                <button class="level-btn" onclick="selectLevel('A1')">
                    <span class="level-tag">A1</span>
                    <span class="level-desc">Principiante</span>
                    <small>Vocabulario básico, frases simples</small>
                </button>
                <button class="level-btn" onclick="selectLevel('A2')">
                    <span class="level-tag">A2</span>
                    <span class="level-desc">Elemental</span>
                    <small>Descripciones, rutinas, pasado simple</small>
                </button>
                <button class="level-btn" onclick="selectLevel('B1')">
                    <span class="level-tag">B1</span>
                    <span class="level-desc">Intermedio</span>
                    <small>Opiniones, experiencias, textos más largos</small>
                </button>
                <button class="level-btn" onclick="selectLevel('B2')">
                    <span class="level-tag">B2</span>
                    <span class="level-desc">Intermedio-Alto</span>
                    <small>Artículos complejos, argumentación</small>
                </button>
            </div>
        </main>

        <footer class="app-footer">
            <p>📚 Aprende inglés leyendo, no memorizando</p>
        </footer>
    </div>

    <script>
        function selectLevel(level) {
            localStorage.setItem('userLevel', level);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
